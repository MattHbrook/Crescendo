version: "2"

linters:
  enable:
    - staticcheck
    - errcheck
    - gosec
    - revive
    - bodyclose
    - errorlint
    - noctx
    - sqlclosecheck
    - unconvert
    - unparam
    - wastedassign

  settings:
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

run:
  timeout: 5m
