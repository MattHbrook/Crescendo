{{define "search_results"}}
{{if eq .Type "artists"}}
<div class="grid">
    {{range .Artists}}
    <article>
        <header>
            <a href="/artist/{{.ID}}">{{.Name}}</a>
        </header>
        {{if .Picture}}
        <img src="https://resources.tidal.com/images/{{.Picture | replace "-" "/"}}/320x320.jpg" alt="{{.Name}}" loading="lazy" style="width:100%;border-radius:var(--pico-border-radius)">
        {{end}}
        <footer>
            <a href="/artist/{{.ID}}" role="button" class="outline">View Albums</a>
        </footer>
    </article>
    {{end}}
</div>
{{else}}
<div class="grid">
    {{range .Albums}}
    <article>
        <header>
            <a href="/album/{{.ID}}">{{.Title}}</a>
        </header>
        {{if .Cover}}
        <img src="https://resources.tidal.com/images/{{.Cover | replace "-" "/"}}/320x320.jpg" alt="{{.Title}}" loading="lazy" style="width:100%;border-radius:var(--pico-border-radius)">
        {{end}}
        <footer>
            <small>{{.Artist.Name}}</small><br>
            <a href="/album/{{.ID}}" role="button" class="outline">View Album</a>
        </footer>
    </article>
    {{end}}
</div>
{{end}}
{{end}}
