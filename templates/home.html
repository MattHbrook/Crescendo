{{define "content"}}
<hgroup>
    <h1>Welcome to Crescendo</h1>
    <p>Music discovery and download manager</p>
</hgroup>

<div class="grid">
    <article>
        <header>Search</header>
        <p>Find artists and albums on Tidal</p>
        <footer><a href="/search" role="button">Search Music</a></footer>
    </article>
    <article>
        <header>Library</header>
        <p>Browse your local music collection</p>
        <footer><a href="/library" role="button">View Library</a></footer>
    </article>
    <article>
        <header>Discover</header>
        <p>Get album recommendations based on your library</p>
        <footer><a href="/discover" role="button">Discover</a></footer>
    </article>
</div>
{{end}}
