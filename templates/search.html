{{define "content"}}
<h1>Search</h1>

<form hx-get="/search/results" hx-target="#results" hx-indicator="#spinner">
    <fieldset role="group">
        <input type="text" name="q" placeholder="Artist or album name..." required autofocus>
        <select name="type">
            <option value="artists">Artists</option>
            <option value="albums">Albums</option>
        </select>
        <button type="submit">Search</button>
    </fieldset>
</form>

<div id="spinner" class="htmx-indicator" aria-busy="true">Searching...</div>
<div id="results">
    {{if .Results}}
        {{template "search_results" .}}
    {{end}}
</div>
{{end}}
